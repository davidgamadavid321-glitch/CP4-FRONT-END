<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoTrend | Produtos</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../../index.html">EcoTrend</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="../../index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="./produtos.html">Produtos</a></li>
          <li class="nav-item"><a class="nav-link" href="./sobre.html">Sobre</a></li>
          <li class="nav-item"><a class="nav-link" href="./contatos.html">Contato</a></li>
          <li class="nav-item ms-lg-3">
            <a class="btn btn-light text-success fw-semibold" href="./carrinho.html">Carrinho</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="page-header text-center py-5">
    <div class="container">
      <h1 class="fw-bold">Nossos Produtos</h1>
      <p class="text-muted">Escolha por categoria, preço e marca</p>
    </div>
  </header>

  <main class="container mb-5">
    <div class="row g-4">
      <aside class="col-lg-3">
        <div class="filter-box shadow-sm">
          <h4 class="mb-3">Filtros</h4>

          <div class="mb-4">
            <h6>Categoria</h6>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="roupas">
              <label class="form-check-label" for="roupas">Roupas</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="beleza">
              <label class="form-check-label" for="beleza">Beleza</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="casa">
              <label class="form-check-label" for="casa">Casa</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="tecnologia">
              <label class="form-check-label" for="tecnologia">Tecnologia verde</label>
            </div>
          </div>

          <div class="mb-4">
            <h6>Faixa de preço</h6>
            <input type="range" class="form-range">
            <p class="small text-muted">Até R$ 200,00</p>
          </div>

          <div class="mb-3">
            <h6>Marca</h6>
            <select class="form-select">
              <option selected>Selecionar</option>
              <option>EcoWear</option>
              <option>BioCare</option>
              <option>GreenHome</option>
              <option>EcoTech</option>
            </select>
          </div>
        </div>
      </aside>

      <section class="col-lg-9">
        <div class="row g-4">
        </div>
      </section>
    </div>
  </main>

</body>
</html>
