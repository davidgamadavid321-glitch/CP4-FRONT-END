<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12 text-center">
                <h1>Como podemos ajudar?</h1>
                <h2>Dúvidas frequentes:</h2>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12 text-center">
                <button class="btn btn-success me-2" type="button" data-bs-toggle="collapse" data-bs-target="#boxContatos">
                    Nossos Contatos
                </button>
                <button class="btn btn-success me-2" type="button" data-bs-toggle="collapse" data-bs-target="#boxCompras">
                    Dúvidas de compras
                </button>
                <button class="btn btn-success" type="button" data-bs-toggle="collapse" data-bs-target="#boxEnvios">
                    Envios
                </button>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-8 mx-auto">
                <div class="collapse" id="boxCompras">
                    <div class="card card-body">
                        <p>Quais são as formas de pagamento?</p>
                        <p>Você pode pagar com cartão de crédito, débito, boleto ou PIX.</p>
                    </div>
                </div>

                <div class="collapse" id="boxEnvios">
                    <div class="card card-body">
                        <p>Quais são as opções de envio?</p>
                        <p>Oferecemos envio padrão SEDEX ou PAC.</p>
                    </div>
                </div>

                <div class="collapse" id="boxContatos">
                    <div class="card card-body">
                        <p>Email: contato@exemplo.com</p>
                        <p>Telefone: (11) 1234-5678</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-md-6 mx-auto">
                <form>
                    <div class="mb-3">
                        <label for="name" class="form-label">Nome:</label>
                        <input type="text" id="name" name="name" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email:</label>
                        <input type="email" id="email" name="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="message" class="form-label">Mensagem:</label>
                        <textarea id="message" name="message" class="form-control" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-success">Enviar</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
